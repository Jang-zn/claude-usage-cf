accounts:
  - name: "Personal"
    claude_home: "~/.claude"
  # - name: "Work"
  #   claude_home: "~/.claude-work"

limits:
  - model: "opus"
    weekly_tokens: 45_000_000
  - model: "sonnet"
    weekly_tokens: 45_000_000
  - model: "haiku"
    weekly_tokens: 45_000_000

display:
  refresh_interval: 5
  default_period: "week"
  show_cost: true

# Menu bar (macOS SwiftBar)
menubar:
  enabled: false
  interval: "1m"  # Supported values: 30s, 1m, 5m, 1h
